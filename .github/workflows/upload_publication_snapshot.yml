name: Upload publication snapshot

on:
  push:
    branches:
      - automation/publication-snapshot
    paths:
      - snapshots/publications.parquet
      - snapshots/publications.parquet.manifest.json
  workflow_dispatch:
    inputs:
      snapshot_ref:
        description: Git ref containing the validated snapshot
        required: true
        default: automation/publication-snapshot
        type: string

permissions:
  contents: write

concurrency:
  group: scholar-publication-upload-v1
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: upload
    env:
      SNAPSHOT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.snapshot_ref || github.sha }}
    steps:
      - name: Check out trusted uploader
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          path: source
          persist-credentials: true
      - name: Check out collected snapshot
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.SNAPSHOT_REF }}
          path: snapshot
          persist-credentials: false
          sparse-checkout: |
            snapshots/publications.parquet
            snapshots/publications.parquet.manifest.json
          sparse-checkout-cone-mode: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: source/requirements-upload.txt
      - name: Install upload dependencies
        run: python -m pip install --requirement source/requirements-upload.txt
      - name: Validate and upload snapshot
        env:
          HF_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          python source/upload_snapshot.py \
            --snapshot snapshot/snapshots/publications.parquet \
            --manifest snapshot/snapshots/publications.parquet.manifest.json \
            --status-file source/status/last-refresh.json
      - name: Record upload status
        if: ${{ always() }}
        working-directory: source
        run: |
          if [ ! -f status/last-refresh.json ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add status/last-refresh.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Record Scholar snapshot upload [skip ci]"
          git push origin HEAD:main
