name: Refresh Scholar publications

on:
  schedule:
    - cron: "17 2 1 * *"
      timezone: America/New_York
  workflow_dispatch:
    inputs:
      full_refresh:
        description: Rebuild every current Scholar publication
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: scholar-publication-refresh-v3
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: upload
    steps:
      - name: Check out the default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install runtime dependencies
        run: python -m pip install --requirement requirements.txt
      - name: Refresh the publication dataset
        env:
          HF_TOKEN: ${{ secrets.API_TOKEN }}
          FULL_REFRESH: ${{ inputs.full_refresh || false }}
        run: |
          args=(--status-file status/last-refresh.json)
          if [ "$FULL_REFRESH" = "true" ]; then
            args+=(--full-refresh)
          fi
          python main.py "${args[@]}"
      - name: Record refresh status
        if: ${{ always() }}
        run: |
          if [ ! -f status/last-refresh.json ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add status/last-refresh.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Record Scholar refresh status [skip ci]"
          git push origin HEAD:main
